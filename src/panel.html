<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sherpa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d14;
      --surface:   #16161f;
      --border:    #2a2a3d;
      --accent:    #FF4444;
      --accent-dim:#FF444422;
      --text:      #e8e8f0;
      --muted:     #7070a0;
      --user-bg:   #1e1e2e;
      --claude-bg: #13131c;
      --radius:    10px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 13px; overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    #header .logo { font-size: 18px; line-height: 1; }
    #header h1 { font-size: 14px; font-weight: 700; color: var(--text); }
    #header h1 span { color: var(--accent); }

    /* ── Model selector ── */
    #model-selector { position: relative; margin-left: auto; }

    #model-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 9px;
      color: var(--text); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s; white-space: nowrap;
    }
    #model-btn:hover { border-color: var(--accent); }
    #model-btn .provider-icon { font-size: 12px; }
    #model-btn .chevron { color: var(--muted); font-size: 9px; margin-left: 2px; }

    #model-dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 6px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: 200px; z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden;
    }
    #model-dropdown.open { display: block; }

    .provider-group { padding: 6px 0; border-bottom: 1px solid var(--border); }
    .provider-group:last-child { border-bottom: none; }

    .provider-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      padding: 4px 12px 2px;
    }

    .model-option {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; background: none; border: none;
      padding: 6px 12px; color: var(--text); font-size: 12px;
      cursor: pointer; transition: background 0.1s; text-align: left;
    }
    .model-option:hover { background: var(--user-bg); }
    .model-option.active { color: var(--accent); }
    .model-option .tier {
      font-size: 9px; color: var(--muted); font-weight: 500;
      background: var(--border); border-radius: 4px; padding: 1px 5px;
    }

    #clear-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    #clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Setup screen ── */
    #setup-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; gap: 14px;
    }
    #setup-screen p { color: var(--muted); text-align: center; line-height: 1.6; font-size: 12px; }
    #setup-screen input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      color: var(--text); font-size: 12px; outline: none; font-family: monospace;
    }
    #setup-screen input:focus { border-color: var(--accent); }
    #save-key-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); padding: 10px; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }

    /* ── Key modal (for switching providers) ── */
    #key-modal {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center; padding: 24px;
    }
    #key-modal.open { display: flex; }
    #key-modal-inner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; width: 100%; display: flex;
      flex-direction: column; gap: 12px;
    }
    #key-modal h3 { font-size: 13px; font-weight: 700; color: var(--text); }
    #key-modal p { font-size: 11px; color: var(--muted); line-height: 1.5; }
    #key-modal input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text);
      font-size: 12px; outline: none; font-family: monospace;
    }
    #key-modal input:focus { border-color: var(--accent); }
    #key-modal-actions { display: flex; gap: 8px; }
    #key-modal-save {
      flex: 1; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer;
    }
    #key-modal-cancel {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer;
    }
    #key-modal-cancel:hover { border-color: var(--muted); }

    /* ── Chat messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; gap: 4px; animation: msgIn 0.2s ease-out; }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); padding: 0 4px;
    }
    .msg.user .msg-label { color: var(--accent); }

    .msg-bubble {
      border-radius: var(--radius); padding: 10px 14px;
      line-height: 1.6; font-size: 12.5px;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg); border: 1px solid var(--border);
      align-self: flex-end; max-width: 90%;
    }
    .msg.claude .msg-bubble {
      background: var(--claude-bg); border: 1px solid var(--border); max-width: 100%;
    }

    /* Markdown rendering */
    .msg-bubble strong { color: var(--text); font-weight: 700; }
    .msg-bubble em { font-style: italic; color: #c0c0d8; }
    .msg-bubble code {
      background: #1e1e2e; border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 11px;
    }
    .msg-bubble h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .msg-bubble h4 { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
    .msg-bubble .md-list-item { display: flex; gap: 6px; margin: 3px 0; }
    .msg-bubble .md-list-item .num { color: var(--accent); font-weight: 700; flex-shrink: 0; }

    .msg-screenshot { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); opacity: 0.8; }

    /* ── Typing indicator ── */
    .typing-dots { display: flex; gap: 4px; padding: 6px 0; }
    .typing-dots span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: dot 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ── */
    #input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; flex-direction: column;
      gap: 8px; flex-shrink: 0;
    }
    #screenshot-bar { display: flex; align-items: center; gap: 8px; }
    #screenshot-thumb {
      width: 40px; height: 28px; object-fit: cover;
      border-radius: 4px; border: 1px solid var(--accent); display: none;
    }
    #screenshot-label { font-size: 11px; color: var(--accent); display: none; }
    #capture-btn {
      background: var(--accent-dim); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 6px; padding: 5px 10px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    }
    #capture-btn:hover { background: var(--accent); color: #fff; }
    #remove-screenshot {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 14px; display: none; padding: 0 2px;
    }
    #remove-screenshot:hover { color: var(--accent); }

    #input-row { display: flex; gap: 8px; }
    #user-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 12px; color: var(--text);
      font-size: 12.5px; font-family: inherit; resize: none; outline: none;
      line-height: 1.5; max-height: 120px; transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent); border: none; border-radius: var(--radius);
      width: 38px; height: 38px; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      align-self: flex-end; flex-shrink: 0; transition: opacity 0.15s;
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }

    #hint { font-size: 10.5px; color: var(--muted); text-align: center; padding-bottom: 2px; }
    #hint kbd { background: var(--border); border-radius: 3px; padding: 1px 5px; font-size: 10px; }
  </style>
</head>
<body>
  <div id="app" style="position:relative;">

    <div id="header">
      <div class="logo">🗻</div>
      <h1><span>Sherpa</span></h1>

      <div id="model-selector">
        <button id="model-btn">
          <span id="model-provider-icon">🔮</span>
          <span id="model-name-label">Sonnet</span>
          <span class="chevron">▾</span>
        </button>
        <div id="model-dropdown">
          <div class="provider-group">
            <div class="provider-label">🔮 Anthropic</div>
            <button class="model-option" data-model="claude-haiku-4-5-20251001" data-provider="anthropic" data-label="Haiku">Haiku <span class="tier">fastest</span></button>
            <button class="model-option active" data-model="claude-sonnet-4-6" data-provider="anthropic" data-label="Sonnet">Sonnet <span class="tier">balanced</span></button>
            <button class="model-option" data-model="claude-opus-4-8" data-provider="anthropic" data-label="Opus">Opus <span class="tier">smartest</span></button>
          </div>
          <div class="provider-group">
            <div class="provider-label">⚡ OpenAI</div>
            <button class="model-option" data-model="gpt-4o-mini" data-provider="openai" data-label="GPT-4o mini">GPT-4o mini <span class="tier">fast</span></button>
            <button class="model-option" data-model="gpt-4o" data-provider="openai" data-label="GPT-4o">GPT-4o <span class="tier">smart</span></button>
          </div>
          <div class="provider-group">
            <div class="provider-label">✦ Google</div>
            <button class="model-option" data-model="gemini-2.0-flash-exp" data-provider="google" data-label="Gemini Flash">Gemini Flash <span class="tier">fast</span></button>
            <button class="model-option" data-model="gemini-1.5-pro" data-provider="google" data-label="Gemini Pro">Gemini Pro <span class="tier">smart</span></button>
          </div>
        </div>
      </div>

      <button id="clear-btn">Clear markers</button>
    </div>

    <!-- Setup screen -->
    <div id="setup-screen">
      <p id="setup-desc">Paste your Anthropic API key to get started.<br/>Stored locally — never sent anywhere except the AI provider.</p>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." spellcheck="false" />
      <button id="save-key-btn">Save & Start</button>
    </div>

    <!-- Chat -->
    <div id="messages" style="display:none"></div>

    <!-- Input -->
    <div id="input-area" style="display:none">
      <div id="screenshot-bar">
        <button id="capture-mode-toggle" style="background: var(--border); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.2s;">⊙ Capture Mode: OFF</button>
        <button id="capture-btn" title="Or press C key while hovering" style="margin-left: 8px;">📷 Capture screen</button>
        <img id="screenshot-thumb" alt="screenshot" />
        <span id="screenshot-label">Screen attached</span>
        <button id="remove-screenshot" title="Remove">✕</button>
      </div>
      <div id="input-row">
        <textarea id="user-input" rows="2" placeholder="Ask Sherpa about this page…"></textarea>
        <button id="send-btn">↑</button>
      </div>
      <div id="hint"><kbd>C</kbd> to capture • <kbd>Enter</kbd> to send • <kbd>Shift+Enter</kbd> for new line</div>
    </div>

    <!-- Key entry modal (for switching providers) -->
    <div id="key-modal">
      <div id="key-modal-inner">
        <h3 id="key-modal-title">Add API Key</h3>
        <p id="key-modal-desc">Enter your API key to use this model.</p>
        <input type="password" id="key-modal-input" placeholder="" spellcheck="false" />
        <div id="key-modal-actions">
          <button id="key-modal-cancel">Cancel</button>
          <button id="key-modal-save">Save & Switch</button>
        </div>
      </div>
    </div>

  </div>

  <script src="panel.js"></script>
</body>
</html>
